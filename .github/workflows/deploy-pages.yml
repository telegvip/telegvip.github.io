name: Publicar TELEGVIP en GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar solamente la web pública
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '_site' \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.gitignore' \
            --exclude 'functions' \
            --exclude '*.bat' \
            --exclude '*.txt' \
            --exclude 'firebase.json' \
            --exclude 'firestore.rules' \
            --exclude 'storage.rules'
          touch _site/.nojekyll

      - name: Subir archivos de la página
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
