<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Abriendo perfil VIP…</title>
</head>
<body>
<script>
  (function(){
    var route=location.pathname.replace(/^\/+|\/+$/g,'');
    var target=new URL('/',location.origin);
    if(route)target.searchParams.set('profileRoute',route);
    location.replace(target.href);
  })();
</script>
</body>
</html>
